<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Agendamento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-dark d-flex align-items-center" style="min-height: 100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card bg-secondary text-white shadow-lg">
          <div class="card-body p-4">
            <h3 class="text-center mb-4"><i class="bi bi-person-circle"></i> <span id="form-titulo">Entrar</span></h3>

            <div id="mensagem" class="alert d-none"></div>

            <form id="auth-form">
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
              </div>
              <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" id="senha" class="form-control" placeholder="Sua senha" required minlength="6">
              </div>
              <button type="submit" id="btn-submit" class="btn btn-primary w-100">
                <span id="btn-texto">Entrar</span>
                <span id="btn-loading" class="spinner-border spinner-border-sm d-none"></span>
              </button>
            </form>

            <p class="text-center mt-3 mb-0">
              <a href="#" id="toggle-form" class="text-info text-decoration-none">Criar uma conta</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
