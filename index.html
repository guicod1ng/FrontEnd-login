<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro e Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <main>
    <div id="mensagem" class="api-mensagem hidden"></div>
    <div class="forms-container">
      <!-- Registro -->
      <form id="register-form">
        <h2>Criar Conta</h2>
        <label for="register-email">Email</label>
        <input type="email" id="register-email" placeholder="email@exemplo.com" required>
        <label for="register-password">Senha</label>
        <input type="password" id="register-password" placeholder="Mínimo 6 caracteres" required minlength="6">
        <button type="submit" id="register-submit">Registrar</button>
        <p class="form-footer">Já tem conta? <a href="#" id="show-login">Entrar</a></p>
      </form>
      <!-- Login -->
      <form id="login-form" class="hidden-form">
        <h2>Acessar</h2>
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="email@exemplo.com" required>
        <label for="login-password">Senha</label>
        <input type="password" id="login-password" placeholder="Sua senha" required>
        <button type="submit" id="login-submit">Entrar</button>
        <p class="form-footer">Não tem conta? <a href="#" id="show-register">Cadastre-se</a></p>
      </form>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
