<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Clientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-dark text-white" style="min-height: 100vh;">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2><i class="bi bi-people-fill"></i> Meus Clientes</h2>
      <div>
        <a href="agendamentos.html" class="btn btn-outline-info me-2"><i class="bi bi-calendar-check"></i> Agendamentos</a>
        <button id="btn-sair" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Sair</button>
      </div>
    </div>

    <div id="mensagem" class="alert d-none"></div>

    <div class="card bg-secondary text-white mb-4 shadow">
      <div class="card-body">
        <form id="cliente-form" class="row g-2">
          <input type="hidden" id="cliente-id">
          <div class="col-md-5">
            <input type="text" id="cliente-nome" class="form-control" placeholder="Nome" required>
          </div>
          <div class="col-md-5">
            <input type="text" id="cliente-telefone" class="form-control" placeholder="Telefone" required>
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">
              <span id="btn-texto"><i class="bi bi-plus-lg"></i> Adicionar</span>
              <span id="btn-loading" class="spinner-border spinner-border-sm d-none"></span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="lista-clientes" class="row g-3"></div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
